    <main class="contenedor">
        <h2>Encuesta de Percepción</h2>
        <div class="formulario-caja" style="max-width: 600px;">
            <form action="#">
                <div class="input-grupo">
                    <label>¿Qué te parece la temática ecológica de Ixora?</label>
                    <select>
                        <option>Muy Interesante</option>
                        <option>Interesante</option>
                        <option>Normal</option>
                    </select>
                </div>
                <div class="input-grupo">
                    <label>¿Cómo calificarías la dificultad de los niveles (1-10)?</label>
                    <input type="number" min="1" max="10">
                </div>
                <div class="input-grupo">
                    <label>¿Comprarías más juegos de Sonoma Studio?</label>
                    <input type="radio" name="compra" value="si"> Sí
                    <input type="radio" name="compra" value="no" style="margin-left: 20px;"> No
                </div>
                <button type="submit" class="boton-primario" style="width: 100%;">Enviar Encuesta</button>
            </form>
        </div>
    </main>
